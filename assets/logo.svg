  <!-- Tagline -->
  <text x="100" y="152" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="normal"
        fill="#a8e6c1" text-anchor="middle" letter-spacing="2">BERKAHKARYA</text>
  <!-- Decorative dots -->
  <circle cx="44" cy="100" r="4" fill="#a8e6c1" opacity="0.6"/>
  <circle cx="156" cy="100" r="4" fill="#a8e6c1" opacity="0.6"/>

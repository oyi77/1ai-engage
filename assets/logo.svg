<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     version="1.2" baseProfile="tiny"
     viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#1a7a4a"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.3"/>
  <!-- Letters BK -->
  <text x="100" y="115" font-family="Arial,Helvetica,sans-serif" font-size="72" font-weight="bold"
